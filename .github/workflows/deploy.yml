name: Deploy Erik OS

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Execute deployment script
        run: |
          mkdir -p ~/scripts
          cat << 'EOF' > ~/scripts/deploy.sh
          #!/bin/bash
          set -e
          REPO_DIR="/home/ubuntu/erik-roast"
          if [ ! -d "$REPO_DIR" ]; then
            git clone https://github.com/PseudoMotivated/erik-roast.git "$REPO_DIR"
          fi
          cd "$REPO_DIR"
          git fetch origin
          git reset --hard origin/master
          npm install
          npm run build
          sudo systemctl restart erik-roast
          EOF
          chmod +x ~/scripts/deploy.sh
          ~/scripts/deploy.sh
